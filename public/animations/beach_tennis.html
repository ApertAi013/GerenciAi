<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Tennis 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080810; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  .score-bar { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 16px; background: rgba(0,0,0,0.85); padding: 10px 24px; border-radius: 12px; border: 1px solid #333; z-index: 100; backdrop-filter: blur(10px); }
  .score-bar .team { text-align: center; min-width: 70px; }
  .score-bar .team-name { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }
  .score-bar .team-score { font-size: 32px; font-weight: 800; }
  .score-bar .team-a .team-score { color: #3B82F6; }
  .score-bar .team-b .team-score { color: #EF4444; }
  .score-bar .vs { font-size: 13px; opacity: 0.3; font-weight: 600; }
  #canvas-container { width: 100vw; height: 100vh; }
  .goal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.15s; }
  .goal-overlay.show { opacity: 1; }
  .goal-text { font-size: 100px; font-weight: 900; text-shadow: 0 0 60px currentColor, 0 0 120px currentColor; animation: none; }
  .goal-overlay.show .goal-text { animation: goalPulse 0.4s ease-out; }
  .goal-text.blue { color: #3B82F6; }
  .goal-text.red { color: #EF4444; }
  @keyframes goalPulse { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<div class="score-bar">
  <div class="team team-a">
    <div class="team-name" id="name-a">Time A</div>
    <div class="team-score" id="score-a">0</div>
  </div>
  <div class="vs">VS</div>
  <div class="team team-b">
    <div class="team-name" id="name-b">Time B</div>
    <div class="team-score" id="score-b">0</div>
  </div>
</div>
<div id="canvas-container"></div>
<div class="goal-overlay" id="goal-overlay"><div class="goal-text" id="goal-text">PONTO!</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// URL params
var params = new URLSearchParams(window.location.search);
var team1Name = params.get('team1') || 'Time A';
var team2Name = params.get('team2') || 'Time B';
var scoreA = parseInt(params.get('score1') || '0');
var scoreB = parseInt(params.get('score2') || '0');
document.getElementById('name-a').textContent = team1Name;
document.getElementById('name-b').textContent = team2Name;
document.getElementById('score-a').textContent = scoreA;
document.getElementById('score-b').textContent = scoreB;

// ========== TEXTURES ==========
function createSandTexture(isOuter) {
  var c = document.createElement('canvas'); c.width = 256; c.height = 256;
  var ctx = c.getContext('2d');
  ctx.fillStyle = isOuter ? '#b8963a' : '#d4a843'; ctx.fillRect(0, 0, 256, 256);
  for (var n = 0; n < 2000; n++) {
    var nx = Math.random() * 256, ny = Math.random() * 256, s = Math.random();
    ctx.fillStyle = s > 0.5 ? 'rgba(220,190,110,' + (0.1 + s * 0.15) + ')' : 'rgba(150,120,60,' + (0.1 + s * 0.15) + ')';
    ctx.fillRect(nx, ny, 1 + Math.random() * 2, 1 + Math.random() * 2);
  }
  var tex = new THREE.CanvasTexture(c); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

// ========== CAPSULE PLAYER ==========
function createCapsulePlayer(jerseyColor, height) {
  height = height || 1.5;
  var group = new THREE.Group();
  var bodyMat = new THREE.MeshStandardMaterial({ color: jerseyColor, roughness: 0.35, metalness: 0.0 });
  var headR = height * 0.15, neckR = height * 0.04, neckH = height * 0.03;
  var chestW = height * 0.12, waistW = height * 0.08, torsoH = height * 0.22;
  var hipR = height * 0.09, legRTop = height * 0.055, legRBot = height * 0.04, legH = height * 0.28;
  var armRTop = height * 0.04, armRBot = height * 0.03, armH = height * 0.24;
  var handR = height * 0.035, footH = height * 0.03, footW = height * 0.045, footD = height * 0.08, legGap = height * 0.06;
  var footY = footH, legBot = footY + footH, legTop = legBot + legH;
  var hipY = legTop + hipR * 0.3, torsoBot = hipY, torsoTop = torsoBot + torsoH;
  var neckBot = torsoTop, neckTop = neckBot + neckH, headY = neckTop + headR * 0.9;
  var shoulderY = torsoTop - torsoH * 0.08;

  var head = new THREE.Mesh(new THREE.SphereGeometry(headR, 24, 16), bodyMat);
  head.position.y = headY; head.castShadow = true; group.add(head);
  var neck = new THREE.Mesh(new THREE.CylinderGeometry(neckR, neckR, neckH + headR * 0.3, 12), bodyMat);
  neck.position.y = neckBot + neckH * 0.5; neck.castShadow = true; group.add(neck);
  var torso = new THREE.Mesh(new THREE.CylinderGeometry(chestW, waistW, torsoH, 16, 1), bodyMat);
  torso.position.y = torsoBot + torsoH * 0.5; torso.castShadow = true; group.add(torso);
  var hips = new THREE.Mesh(new THREE.SphereGeometry(hipR, 14, 10), bodyMat);
  hips.position.y = hipY; hips.scale.set(1.1, 0.6, 0.8); hips.castShadow = true; group.add(hips);

  var legGeo = new THREE.CylinderGeometry(legRTop, legRBot, legH, 10);
  var legLPivot = new THREE.Group(); legLPivot.position.set(-legGap, legTop, 0);
  var legLMesh = new THREE.Mesh(legGeo, bodyMat); legLMesh.position.y = -legH * 0.5; legLMesh.castShadow = true; legLPivot.add(legLMesh);
  var kneeL = new THREE.Mesh(new THREE.SphereGeometry(legRTop * 1.05, 8, 6), bodyMat); kneeL.position.y = -legH * 0.45; legLPivot.add(kneeL);
  var footL = new THREE.Mesh(new THREE.SphereGeometry(footW, 10, 8), bodyMat); footL.position.set(0, -legH, footD * 0.2); footL.scale.set(1, 0.55, 1.8); footL.castShadow = true; legLPivot.add(footL);
  group.add(legLPivot);
  var legRPivot = new THREE.Group(); legRPivot.position.set(legGap, legTop, 0);
  var legRMesh = new THREE.Mesh(legGeo, bodyMat); legRMesh.position.y = -legH * 0.5; legRMesh.castShadow = true; legRPivot.add(legRMesh);
  var kneeR = new THREE.Mesh(new THREE.SphereGeometry(legRTop * 1.05, 8, 6), bodyMat); kneeR.position.y = -legH * 0.45; legRPivot.add(kneeR);
  var footR = new THREE.Mesh(new THREE.SphereGeometry(footW, 10, 8), bodyMat); footR.position.set(0, -legH, footD * 0.2); footR.scale.set(1, 0.55, 1.8); footR.castShadow = true; legRPivot.add(footR);
  group.add(legRPivot);

  var armGeo = new THREE.CylinderGeometry(armRTop, armRBot, armH, 10);
  var armLPivot = new THREE.Group(); armLPivot.position.set(-chestW - armRTop * 0.8, shoulderY, 0);
  armLPivot.add(new THREE.Mesh(new THREE.SphereGeometry(armRTop * 1.3, 8, 6), bodyMat));
  var armLMesh = new THREE.Mesh(armGeo, bodyMat); armLMesh.position.y = -armH * 0.5; armLMesh.castShadow = true; armLPivot.add(armLMesh);
  var handLMesh = new THREE.Mesh(new THREE.SphereGeometry(handR, 10, 8), bodyMat); handLMesh.position.y = -armH - handR * 0.3; armLPivot.add(handLMesh);
  armLPivot.rotation.z = 0.12; group.add(armLPivot);
  var armRPivot = new THREE.Group(); armRPivot.position.set(chestW + armRTop * 0.8, shoulderY, 0);
  armRPivot.add(new THREE.Mesh(new THREE.SphereGeometry(armRTop * 1.3, 8, 6), bodyMat));
  var armRMesh = new THREE.Mesh(armGeo, bodyMat); armRMesh.position.y = -armH * 0.5; armRMesh.castShadow = true; armRPivot.add(armRMesh);
  var handRMesh = new THREE.Mesh(new THREE.SphereGeometry(handR, 10, 8), bodyMat); handRMesh.position.y = -armH - handR * 0.3; armRPivot.add(handRMesh);
  armRPivot.rotation.z = -0.12; group.add(armRPivot);

  // Racket (flat disc on right hand)
  var racketMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.4, metalness: 0.3 });
  var racketHead = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.02, 16), racketMat);
  racketHead.rotation.x = Math.PI / 2;
  racketHead.position.y = -armH - handR * 0.3 - 0.12;
  armRPivot.add(racketHead);
  // Racket face (colored)
  var faceMat = new THREE.MeshStandardMaterial({ color: 0xCCFF00, roughness: 0.5, metalness: 0.1, emissive: 0xCCFF00, emissiveIntensity: 0.05 });
  var racketFace = new THREE.Mesh(new THREE.CylinderGeometry(0.10, 0.10, 0.015, 16), faceMat);
  racketFace.rotation.x = Math.PI / 2;
  racketFace.position.y = -armH - handR * 0.3 - 0.12;
  racketFace.position.z = 0.01;
  armRPivot.add(racketFace);

  group.userData = { legL: legLPivot, legR: legRPivot, armL: armLPivot, armR: armRPivot, head: head, body: torso, playerHeight: height, baseY: 0 };
  group.castShadow = true;
  return group;
}

// ========== ANIMATION HELPERS ==========
function animatePlayer(player, time, idx, isActive, celebrationState) {
  if (celebrationState === 'happy') {
    var jp = time * 10 + idx * 1.5;
    player.position.y = (player.userData.baseY || 0) + Math.abs(Math.sin(jp)) * 0.35;
    if (player.userData.armL) {
      player.userData.armL.rotation.x = -2.0 + Math.sin(jp * 0.7) * 0.2;
      player.userData.armR.rotation.x = -2.0 + Math.sin(jp * 0.7 + 0.5) * 0.2;
      player.userData.armL.rotation.z = 0.4; player.userData.armR.rotation.z = -0.4;
    }
    if (player.userData.legL) { player.userData.legL.rotation.x = Math.sin(jp) * 0.15; player.userData.legR.rotation.x = -Math.sin(jp) * 0.15; }
    player.rotation.y += 0.03; return;
  }
  if (celebrationState === 'sad') {
    player.position.y = (player.userData.baseY || 0);
    if (player.userData.armL) { player.userData.armL.rotation.x = 0.15; player.userData.armR.rotation.x = 0.15; player.userData.armL.rotation.z = 0.35; player.userData.armR.rotation.z = -0.35; }
    if (player.userData.legL) { player.userData.legL.rotation.x = 0; player.userData.legR.rotation.x = 0; }
    if (player.userData.head) player.userData.head.rotation.x = 0.3;
    return;
  }
  if (player.userData.head) player.userData.head.rotation.x = 0;
  var speed = isActive ? 7 : 2.5, legAmp = isActive ? 0.5 : 0.1, armAmp = isActive ? 0.4 : 0.08;
  var phase = time * speed + idx * 2.1;
  if (player.userData.legL) { player.userData.legL.rotation.x = Math.sin(phase) * legAmp; player.userData.legR.rotation.x = -Math.sin(phase) * legAmp; }
  if (player.userData.armL) {
    player.userData.armL.rotation.x = Math.sin(phase + Math.PI) * armAmp;
    player.userData.armR.rotation.x = -Math.sin(phase + Math.PI) * armAmp;
    player.userData.armL.rotation.z = 0.15 + Math.abs(Math.sin(phase + Math.PI) * armAmp) * 0.1;
    player.userData.armR.rotation.z = -0.15 - Math.abs(Math.sin(phase + Math.PI) * armAmp) * 0.1;
  }
  player.position.y = (player.userData.baseY || 0) + Math.abs(Math.sin(phase)) * 0.03;
}

// ========== PARTICLES ==========
function createParticleSystem(scene, count, bounds, color1, color2) {
  var particles = [], group = new THREE.Group();
  var geo = new THREE.SphereGeometry(0.015, 4, 4);
  for (var i = 0; i < count; i++) {
    var mat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? color1 : color2, transparent: true, opacity: 0.15 + Math.random() * 0.2 });
    var p = new THREE.Mesh(geo, mat);
    p.position.set((Math.random() - 0.5) * bounds.x, Math.random() * bounds.y + 0.5, (Math.random() - 0.5) * bounds.z);
    p.userData = { vy: 0.002 + Math.random() * 0.005, vx: (Math.random() - 0.5) * 0.003, vz: (Math.random() - 0.5) * 0.003, maxY: bounds.y + 1 };
    group.add(p); particles.push(p);
  }
  scene.add(group); return particles;
}
function animateParticles(particles, time) {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    p.position.y += p.userData.vy; p.position.x += p.userData.vx + Math.sin(time * 0.5 + i) * 0.001; p.position.z += p.userData.vz + Math.cos(time * 0.3 + i) * 0.001;
    if (p.position.y > p.userData.maxY) { p.position.y = 0.2; p.position.x = (Math.random() - 0.5) * 20; p.position.z = (Math.random() - 0.5) * 20; }
  }
}

function createBurstSystem(scene) {
  var pool = [], geo = new THREE.SphereGeometry(0.03, 4, 4), group = new THREE.Group();
  for (var i = 0; i < 30; i++) {
    var mat = new THREE.MeshBasicMaterial({ color: 0xCCFF00, transparent: true, opacity: 0 });
    var p = new THREE.Mesh(geo, mat); p.userData = { active: false, vx: 0, vy: 0, vz: 0, life: 0 }; group.add(p); pool.push(p);
  }
  scene.add(group); return pool;
}
function triggerBurst(pool, pos, color) {
  for (var i = 0; i < pool.length; i++) {
    var p = pool[i]; p.position.copy(pos); p.material.color.setHex(color || 0xCCFF00); p.material.opacity = 0.8;
    p.userData.active = true; p.userData.vx = (Math.random() - 0.5) * 0.15; p.userData.vy = 0.05 + Math.random() * 0.12; p.userData.vz = (Math.random() - 0.5) * 0.15; p.userData.life = 1.0;
  }
}
function animateBurst(pool) {
  for (var i = 0; i < pool.length; i++) {
    var p = pool[i]; if (!p.userData.active) continue;
    p.position.x += p.userData.vx; p.position.y += p.userData.vy; p.position.z += p.userData.vz;
    p.userData.vy -= 0.003; p.userData.life -= 0.025; p.material.opacity = Math.max(0, p.userData.life * 0.8);
    if (p.userData.life <= 0) { p.userData.active = false; p.material.opacity = 0; }
  }
}

function createContactShadow() {
  var geo = new THREE.CircleGeometry(0.25, 16);
  var mat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25, depthWrite: false });
  var shadow = new THREE.Mesh(geo, mat); shadow.rotation.x = -Math.PI / 2; shadow.position.y = 0.015; return shadow;
}

// ========== SAND COURT ==========
function createSandCourt(w, h) {
  var group = new THREE.Group();
  var courtGeo = new THREE.PlaneGeometry(w, h, 64, 64);
  var pos = courtGeo.attributes.position; var colors = [];
  for (var i = 0; i < pos.count; i++) {
    pos.setZ(i, pos.getZ(i) + (Math.random() - 0.5) * 0.025);
    colors.push(0.83 + (Math.random() - 0.5) * 0.06, 0.66 + (Math.random() - 0.5) * 0.06, 0.26 + (Math.random() - 0.5) * 0.04);
  }
  courtGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  pos.needsUpdate = true; courtGeo.computeVertexNormals();
  var sandTex = createSandTexture(false);
  var court = new THREE.Mesh(courtGeo, new THREE.MeshStandardMaterial({ map: sandTex, vertexColors: true, roughness: 0.95, metalness: 0.0 }));
  court.rotation.x = -Math.PI / 2; court.position.y = 0.01; court.receiveShadow = true; group.add(court);
  var lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, emissive: 0xffffff, emissiveIntensity: 0.15 });
  var lh = 0.045, lt = 0.06, ly = 0.03;
  group.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(w, lh, lt), lineMat), { position: new THREE.Vector3(0, ly, -h/2) }));
  group.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(w, lh, lt), lineMat), { position: new THREE.Vector3(0, ly, h/2) }));
  group.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(lt, lh, h), lineMat), { position: new THREE.Vector3(-w/2, ly, 0) }));
  group.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(lt, lh, h), lineMat), { position: new THREE.Vector3(w/2, ly, 0) }));
  return group;
}

// ========== NET (low for beach tennis ~1.5m) ==========
function createNet(width, height) {
  var group = new THREE.Group();
  var postMat = new THREE.MeshStandardMaterial({ color: 0xCCCCCC, roughness: 0.3, metalness: 0.5 });
  var postGeo = new THREE.CylinderGeometry(0.05, 0.05, height + 0.4, 12);
  var postL = new THREE.Mesh(postGeo, postMat); postL.position.set(0, (height + 0.4) / 2, -width / 2); postL.castShadow = true; group.add(postL);
  var postR = new THREE.Mesh(postGeo, postMat); postR.position.set(0, (height + 0.4) / 2, width / 2); postR.castShadow = true; group.add(postR);
  var tapeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, emissive: 0xffffff, emissiveIntensity: 0.1 });
  var tape = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.08, width), tapeMat); tape.position.set(0, height, 0); tape.castShadow = true; group.add(tape);
  var botTape = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.05, width), tapeMat); botTape.position.set(0, height * 0.45, 0); group.add(botTape);
  var netMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25, side: THREE.DoubleSide });
  var netH = height * 0.55, netBot = height * 0.45;
  for (var i = 0; i <= 50; i++) { var z = -width / 2 + width * (i / 50); var s = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, netH, 4), netMat); s.position.set(0, netBot + netH / 2, z); group.add(s); }
  for (var j = 0; j <= 16; j++) { var yy = netBot + netH * (j / 16); var h = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, width, 4), netMat); h.position.set(0, yy, 0); h.rotation.x = Math.PI / 2; group.add(h); }
  return group;
}

// ========== CAMERA LERP ==========
var camState = { x: 7, y: 4.5, z: 7, lx: 0, ly: 1.2, lz: 0 };
function lerpCam(cam, tx, ty, tz, lx, ly, lz, speed) {
  speed = speed || 0.025;
  camState.x += (tx - camState.x) * speed; camState.y += (ty - camState.y) * speed; camState.z += (tz - camState.z) * speed;
  camState.lx += (lx - camState.lx) * speed; camState.ly += (ly - camState.ly) * speed; camState.lz += (lz - camState.lz) * speed;
  cam.position.set(camState.x, camState.y, camState.z); cam.lookAt(camState.lx, camState.ly, camState.lz);
}

// ========== SCENE SETUP ==========
var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.1;
document.getElementById('canvas-container').appendChild(renderer.domElement);

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x080810);
scene.fog = new THREE.Fog(0x080810, 10, 18);

var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(7, 5, 7); camera.lookAt(0, 1, 0);

var ambient = new THREE.AmbientLight(0x505878, 0.5); scene.add(ambient);
var hemi = new THREE.HemisphereLight(0x87CEEB, 0xD4A843, 0.35); scene.add(hemi);
var dirLight = new THREE.DirectionalLight(0xffeedd, 1.3);
dirLight.position.set(5, 12, 5); dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048); dirLight.shadow.camera.near = 1; dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10; dirLight.shadow.camera.right = 10; dirLight.shadow.camera.top = 10; dirLight.shadow.camera.bottom = -10;
dirLight.shadow.bias = -0.001; scene.add(dirLight);
scene.add(new THREE.PointLight(0xff8844, 0.4, 20).translateTo ? new THREE.PointLight(0xff8844, 0.4, 20) : (function(){ var l = new THREE.PointLight(0xff8844, 0.4, 20); l.position.set(-5, 3, -4); return l; })());
scene.add((function(){ var l = new THREE.SpotLight(0xffeebb, 0.5, 25, Math.PI / 5); l.position.set(-4, 10, 0); return l; })());

// Court
scene.add(createSandCourt(8, 5));

// Net (beach tennis = ~1.5m)
scene.add(createNet(5, 1.5));

// Dust particles
var dustParticles = createParticleSystem(scene, 40, { x: 14, y: 5, z: 14 }, 0xd4a843, 0xc49a3a);
var burstPool = createBurstSystem(scene);

// Players (2v2)
var players = [];
var playerShadows = [];
var positions = [
  { x: -3, z: 0.5, team: 'a' }, { x: -1.5, z: -0.5, team: 'a' },
  { x: 1.5, z: 0.5, team: 'b' }, { x: 3, z: -0.5, team: 'b' }
];
for (var pi = 0; pi < positions.length; pi++) {
  var p = positions[pi];
  var player = createCapsulePlayer(p.team === 'a' ? 0x3B82F6 : 0xEF4444, 1.6);
  player.position.set(p.x, 0, p.z);
  player.userData.baseX = p.x; player.userData.baseZ = p.z; player.userData.team = p.team;
  scene.add(player); players.push(player);
  var cs = createContactShadow(); cs.position.set(p.x, 0.015, p.z); scene.add(cs); playerShadows.push(cs);
}

// Ball (tennis ball - smaller, yellow-green)
var ballGeo = new THREE.SphereGeometry(0.08, 28, 20);
var ballMat = new THREE.MeshStandardMaterial({ color: 0xCCFF00, roughness: 0.5, metalness: 0.05, emissive: 0xCCFF00, emissiveIntensity: 0.15 });
var ball = new THREE.Mesh(ballGeo, ballMat); ball.castShadow = true; scene.add(ball);
var ballShadow = createContactShadow(); ballShadow.scale.set(0.4, 0.4, 0.4); scene.add(ballShadow);

// ========== RALLY STATE MACHINE ==========
// Beach tennis: Player A hits -> ball crosses net -> bounces once -> Player B hits -> crosses -> bounces -> repeat
var rally = {
  phase: 'flight',     // 'flight' (ball in air crossing), 'bounce' (ball bouncing on sand), 'hit' (player swinging)
  hitter: 0,           // index of player who last hit
  receiver: 2,         // index of player who will hit next
  team: 'a',           // team that just hit
  ballStart: { x: -2, y: 2.0, z: 0 },
  ballEnd: { x: 2, y: 0.08, z: 0 },
  ballPeak: 3.0,
  progress: 0,
  speed: 0.6,
  bounceStart: null,
  bounceEnd: null,
  bouncePeak: 0,
  lastPhase: ''
};

function parabolaY(sy, py, ey, t) { return sy + (py - sy) * 4 * t * (1 - t) + (ey - sy) * t; }

// Pick a landing spot on the receiver's side
function pickLandingSpot(receiverTeam) {
  var xBase = receiverTeam === 'a' ? -2.0 - Math.random() * 1.0 : 2.0 + Math.random() * 1.0;
  var z = (Math.random() - 0.5) * 3.0;
  return { x: xBase, z: z };
}

// Start a new rally sequence: flight -> bounce -> hit (by receiver) -> flight (other direction)
function startFlight(hitterIdx, receiverIdx) {
  var hitter = players[hitterIdx];
  var receiverTeam = players[receiverIdx].userData.team;
  var landing = pickLandingSpot(receiverTeam);

  rally.phase = 'flight';
  rally.hitter = hitterIdx;
  rally.receiver = receiverIdx;
  rally.team = hitter.userData.team;
  rally.progress = 0;
  rally.speed = 0.55 + Math.random() * 0.15;
  rally.ballStart = { x: hitter.position.x, y: 2.2, z: hitter.position.z };
  rally.ballEnd = { x: landing.x, y: 0.08, z: landing.z };  // lands on sand
  rally.ballPeak = 2.8 + Math.random() * 0.8;
}

function startBounce() {
  rally.phase = 'bounce';
  rally.progress = 0;
  rally.speed = 1.8;  // bounce is fast
  rally.bounceStart = { x: ball.position.x, y: 0.08, z: ball.position.z };
  // Bounce goes up ~0.8m and slightly toward receiver
  var recvPlayer = players[rally.receiver];
  var dx = (recvPlayer.position.x - ball.position.x) * 0.3;
  var dz = (recvPlayer.position.z - ball.position.z) * 0.3;
  rally.bounceEnd = { x: ball.position.x + dx, y: 1.2, z: ball.position.z + dz };
  rally.bouncePeak = 1.0;
}

function startHitPose() {
  rally.phase = 'hit';
  rally.progress = 0;
  rally.speed = 2.0;
}

// Pick receiver: random player on opposing side
function pickReceiver(hittingTeam) {
  if (hittingTeam === 'a') return Math.random() > 0.5 ? 2 : 3;
  return Math.random() > 0.5 ? 0 : 1;
}

// Initialize first flight
startFlight(0, 2);

var clock = new THREE.Clock();
var gameState = { celebrating: false, celebrateTeam: null, startTime: 0 };

// ========== SCORING ==========
function showOverlay(team) {
  var ov = document.getElementById('goal-overlay'), txt = document.getElementById('goal-text');
  txt.className = 'goal-text ' + (team === 'a' ? 'blue' : 'red'); txt.textContent = 'PONTO!';
  ov.classList.remove('show'); void ov.offsetWidth; ov.classList.add('show');
  setTimeout(function() { ov.classList.remove('show'); }, 1200);
}

window.triggerEvent = function(team, type) {
  if (team !== 'a' && team !== 'b') return;
  if (type !== 'point') return;
  if (gameState.celebrating) return;
  gameState.celebrating = true;
  gameState.celebrateTeam = team;
  gameState.startTime = clock.getElapsedTime();
  if (team === 'a') scoreA++; else scoreB++;
  document.getElementById('score-a').textContent = scoreA;
  document.getElementById('score-b').textContent = scoreB;
  showOverlay(team);
};

window.addEventListener('message', function(e) {
  try {
    var data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    if (data.type === 'point') window.triggerEvent(data.team, data.type);
    if (data.type === 'score') {
      if (data.score1 !== undefined) { scoreA = data.score1; document.getElementById('score-a').textContent = scoreA; }
      if (data.score2 !== undefined) { scoreB = data.score2; document.getElementById('score-b').textContent = scoreB; }
    }
  } catch(err) {}
});

// ========== ANIMATION LOOP ==========
function animate() {
  requestAnimationFrame(animate);
  var time = clock.getElapsedTime();

  animateParticles(dustParticles, time);
  animateBurst(burstPool);

  // Celebration
  if (gameState.celebrating) {
    var elapsed = time - gameState.startTime;
    if (elapsed > 3.0) {
      gameState.celebrating = false; gameState.celebrateTeam = null;
      var newHitter = Math.random() > 0.5 ? 0 : 1;
      if (Math.random() > 0.5) newHitter = Math.random() > 0.5 ? 2 : 3;
      startFlight(newHitter, pickReceiver(players[newHitter].userData.team));
    } else {
      ball.position.y = Math.max(0.08, ball.position.y - 0.04);
      for (var i = 0; i < players.length; i++) {
        var celState = players[i].userData.team === gameState.celebrateTeam ? 'happy' : 'sad';
        animatePlayer(players[i], time, i, false, celState);
        playerShadows[i].position.x = players[i].position.x; playerShadows[i].position.z = players[i].position.z;
      }
      ballShadow.position.x = ball.position.x; ballShadow.position.z = ball.position.z;
      var tx = 7.5 * Math.cos(time * 0.1), tz = 7.5 * Math.sin(time * 0.1), ty = 4.5 + Math.sin(time * 0.15) * 0.5;
      lerpCam(camera, tx, ty, tz, 0, 1.2, 0, 0.04);
      renderer.render(scene, camera); return;
    }
  }

  // Advance rally
  rally.progress += 0.016 * rally.speed;
  if (rally.progress > 1.0) rally.progress = 1.0;
  var rawT = rally.progress;
  var t = rawT * rawT * (3 - 2 * rawT);

  if (rally.phase === 'flight') {
    var bs = rally.ballStart, be = rally.ballEnd;
    ball.position.x = bs.x + (be.x - bs.x) * t;
    ball.position.z = bs.z + (be.z - bs.z) * t;
    ball.position.y = parabolaY(bs.y, rally.ballPeak, be.y, t);
    ball.position.y = Math.max(0.08, ball.position.y);

    if (rally.progress >= 1.0) {
      // Ball has landed - start bounce
      triggerBurst(burstPool, ball.position, 0xddcc66);
      startBounce();
    }
  } else if (rally.phase === 'bounce') {
    var bs = rally.bounceStart, be = rally.bounceEnd;
    ball.position.x = bs.x + (be.x - bs.x) * t;
    ball.position.z = bs.z + (be.z - bs.z) * t;
    // Bounce arc: starts at ground, goes up, reaches peak at t=0.5
    ball.position.y = 0.08 + rally.bouncePeak * Math.sin(t * Math.PI);

    if (rally.progress >= 1.0) {
      startHitPose();
    }
  } else if (rally.phase === 'hit') {
    // Ball follows the receiver's hand briefly, then launch
    var recv = players[rally.receiver];
    var handY = recv.userData.playerHeight * 0.85 + recv.position.y;
    ball.position.x += (recv.position.x + (recv.userData.team === 'a' ? 0.3 : -0.3) - ball.position.x) * 0.15;
    ball.position.z += (recv.position.z - ball.position.z) * 0.15;
    ball.position.y += (handY - ball.position.y) * 0.15;

    if (rally.progress >= 1.0) {
      triggerBurst(burstPool, ball.position, 0xCCFF00);
      // Now the receiver becomes the hitter, pick new receiver on other side
      var newHitter = rally.receiver;
      var newReceiver = pickReceiver(players[newHitter].userData.team);
      startFlight(newHitter, newReceiver);
    }
  }

  // Ball spin
  ball.rotation.x += 0.1 * rally.speed;
  ball.rotation.z += 0.05;

  // Ball shadow
  ballShadow.position.x = ball.position.x;
  ballShadow.position.z = ball.position.z;
  ballShadow.material.opacity = Math.max(0.05, 0.25 - ball.position.y * 0.06);
  ballShadow.scale.setScalar(0.3 + ball.position.y * 0.04);

  // Player movement and animation
  for (var i = 0; i < players.length; i++) {
    var pl = players[i];
    var targetX = pl.userData.baseX + Math.sin(time * 1.2 + i * 2.5) * 0.15;
    var targetZ = pl.userData.baseZ + Math.cos(time * 1.0 + i * 3) * 0.12;
    var poseType = 'idle';

    if (i === rally.receiver && (rally.phase === 'bounce' || rally.phase === 'hit')) {
      // Move toward ball
      targetX = ball.position.x + (pl.userData.team === 'a' ? 0.3 : -0.3);
      targetZ = ball.position.z;
      poseType = rally.phase === 'hit' ? 'swing' : 'ready';
    } else if (i === rally.receiver && rally.phase === 'flight') {
      // Move to where ball will land
      targetX = rally.ballEnd.x + (pl.userData.team === 'a' ? 0.5 : -0.5);
      targetZ = rally.ballEnd.z;
      poseType = 'ready';
    } else if (i === rally.hitter && rally.phase === 'flight' && rally.progress < 0.3) {
      poseType = 'follow_through';
    }

    // Clamp to own side
    var isTeamA = (pl.userData.team === 'a');
    if (isTeamA) { targetX = Math.min(targetX, -0.4); targetX = Math.max(targetX, -4.0); }
    else { targetX = Math.max(targetX, 0.4); targetX = Math.min(targetX, 4.0); }
    targetZ = Math.max(-2.5, Math.min(2.5, targetZ));

    pl.position.x += (targetX - pl.position.x) * 0.08;
    pl.position.z += (targetZ - pl.position.z) * 0.08;

    // Prevent teammate overlap
    var tmIdx = isTeamA ? (i === 0 ? 1 : 0) : (i === 2 ? 3 : 2);
    var tm = players[tmIdx];
    var dx = pl.position.x - tm.position.x, dz = pl.position.z - tm.position.z;
    var dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 0.6 && dist > 0.01) { var push = (0.6 - dist) * 0.5; pl.position.x += (dx / dist) * push; pl.position.z += (dz / dist) * push; }
    if (isTeamA) pl.position.x = Math.max(-4.0, Math.min(-0.4, pl.position.x));
    else pl.position.x = Math.max(0.4, Math.min(4.0, pl.position.x));
    pl.position.z = Math.max(-2.5, Math.min(2.5, pl.position.z));

    pl.lookAt(ball.position.x, pl.position.y, ball.position.z);

    // Apply poses
    if (poseType === 'swing') {
      // Racket swing pose - arm raised then swinging
      var swingT = Math.min(t * 1.5, 1);
      pl.userData.armR.rotation.x = -2.5 + swingT * 4.0;
      pl.userData.armR.rotation.z = -0.3;
      pl.userData.armL.rotation.x = -0.5;
      pl.userData.armL.rotation.z = 0.3;
      pl.userData.legL.rotation.x = 0.15;
      pl.userData.legR.rotation.x = -0.1;
      pl.position.y = 0.1 + Math.sin(swingT * Math.PI) * 0.2;
    } else if (poseType === 'follow_through') {
      pl.userData.armR.rotation.x = 1.5;
      pl.userData.armR.rotation.z = -0.2;
      pl.userData.armL.rotation.x = -0.3;
      pl.userData.armL.rotation.z = 0.3;
      pl.userData.legL.rotation.x = 0.1;
      pl.userData.legR.rotation.x = -0.15;
      pl.position.y = Math.sin(time * 3 + i) * 0.02;
    } else if (poseType === 'ready') {
      pl.userData.armR.rotation.x = -1.2;
      pl.userData.armR.rotation.z = -0.2;
      pl.userData.armL.rotation.x = 0.3;
      pl.userData.armL.rotation.z = 0.2;
      pl.userData.legL.rotation.x = 0.1;
      pl.userData.legR.rotation.x = 0.1;
      pl.position.y = Math.sin(time * 3 + i) * 0.02;
    } else {
      pl.position.y = 0;
      animatePlayer(pl, time, i, false, null);
    }

    playerShadows[i].position.x = pl.position.x;
    playerShadows[i].position.z = pl.position.z;
  }

  // Camera orbit
  var tx = 7.5 * Math.cos(time * 0.1), tz = 7.5 * Math.sin(time * 0.1), ty = 4.5 + Math.sin(time * 0.15) * 0.5;
  lerpCam(camera, tx, ty, tz, 0, 1.2, 0, 0.04);

  renderer.render(scene, camera);
}

window.addEventListener('resize', function() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

animate();
</script>
</body>
</html>
