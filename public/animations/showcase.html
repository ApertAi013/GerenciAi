<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Arena - Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
  #wrap { width: 100vw; height: 100vh; position: relative; }
  canvas { display: block; width: 100%; height: 100%; }

  /* Score overlay */
  .score-bar {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 16px;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
    padding: 10px 28px; border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.08);
    z-index: 10;
  }
  .sb-team { font-size: 0.85rem; font-weight: 600; }
  .sb-team.blue { color: #60A5FA; }
  .sb-team.red { color: #F87171; }
  .sb-score { font-size: 2rem; font-weight: 900; color: #fff; min-width: 36px; text-align: center; transition: transform 0.2s; }
  .sb-vs { font-size: 0.7rem; color: #475569; font-weight: 500; }
  .sb-btn { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; font-size: 1rem; font-weight: 700; color: #fff; transition: transform 0.15s; }
  .sb-btn:hover { transform: scale(1.2); }
  .sb-btn.blue { background: #3B82F6; }
  .sb-btn.red { background: #EF4444; }

  /* PONTO overlay */
  .point-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 20; opacity: 0; transition: opacity 0.1s;
  }
  .point-overlay.show { opacity: 1; }
  .point-text {
    font-size: 6rem; font-weight: 900; text-transform: uppercase;
    letter-spacing: 8px; text-shadow: 0 0 40px currentColor, 0 0 80px currentColor, 0 0 120px currentColor;
    animation: pointPop 0.8s ease-out;
  }
  @keyframes pointPop {
    0% { transform: scale(0.3); opacity: 0; }
    30% { transform: scale(1.15); opacity: 1; }
    60% { transform: scale(0.95); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Color flash overlay */
  .flash-overlay {
    position: absolute; inset: 0; pointer-events: none; z-index: 15; opacity: 0;
    transition: opacity 0.15s;
  }
  .flash-overlay.show { opacity: 1; }
</style>
</head>
<body>

<div id="wrap">
  <canvas id="arena"></canvas>

  <div class="score-bar">
    <span class="sb-team blue">Time A</span>
    <button class="sb-btn blue" onclick="score(1)">+</button>
    <span class="sb-score" id="s1">0</span>
    <span class="sb-vs">VS</span>
    <span class="sb-score" id="s2">0</span>
    <button class="sb-btn red" onclick="score(2)">+</button>
    <span class="sb-team red">Time B</span>
  </div>

  <div class="point-overlay" id="pointOverlay">
    <div class="point-text" id="pointText">PONTO!</div>
  </div>

  <div class="flash-overlay" id="flashOverlay"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const wrap = document.getElementById('wrap');
const canvas = document.getElementById('arena');
const W = wrap.clientWidth, H = wrap.clientHeight;

// ─── Scene ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010108);

const camera = new THREE.PerspectiveCamera(35, W / H, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

// ─── Bloom post-processing (the key to realistic neon) ───
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(W, H), 1.2, 0.6, 0.15);
composer.addPass(bloomPass);

// ─── Lighting ───
scene.add(new THREE.AmbientLight(0x060612, 0.4));

// ─── Ground ───
const groundGeo = new THREE.PlaneGeometry(60, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x080810, roughness: 0.85, metalness: 0.05 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
scene.add(ground);

const CW = 16, CH = 8;

// ─── Neon line helper using TubeGeometry for smooth round lines ───
function neonLine(pointsArr, color, thickness = 0.03) {
  const pts = pointsArr.map(p => new THREE.Vector3(...p));
  const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0);

  // Core — bright thin line
  const tubeGeo = new THREE.TubeGeometry(curve, pts.length * 12, thickness, 8, false);
  const tubeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const tube = new THREE.Mesh(tubeGeo, tubeMat);
  scene.add(tube);

  // Inner glow
  const glowGeo = new THREE.TubeGeometry(curve, pts.length * 12, thickness * 3, 8, false);
  const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.6 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  scene.add(glow);

  // Soft outer glow (picked up by bloom)
  const outerGeo = new THREE.TubeGeometry(curve, pts.length * 8, thickness * 8, 6, false);
  const outerMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.15 });
  const outer = new THREE.Mesh(outerGeo, outerMat);
  scene.add(outer);

  return { tube, glow, outer, tubeMat, glowMat, outerMat, color: new THREE.Color(color) };
}

// ─── Court: Blue side (x < 0) ───
const Y = 0.04;
const blueLines = [];
blueLines.push(neonLine([[-CW/2, Y, -CH/2], [-CW/2, Y, CH/2]], 0x3B82F6));   // left
blueLines.push(neonLine([[-CW/2, Y, -CH/2], [0, Y, -CH/2]], 0x3B82F6));       // top
blueLines.push(neonLine([[-CW/2, Y, CH/2], [0, Y, CH/2]], 0x3B82F6));         // bottom

// ─── Court: Red side (x > 0) ───
const redLines = [];
redLines.push(neonLine([[CW/2, Y, -CH/2], [CW/2, Y, CH/2]], 0xEF4444));       // right
redLines.push(neonLine([[0, Y, -CH/2], [CW/2, Y, -CH/2]], 0xEF4444));         // top
redLines.push(neonLine([[0, Y, CH/2], [CW/2, Y, CH/2]], 0xEF4444));           // bottom

// ─── Net: subtle white/magenta ───
const netColor = 0xbb66ff;
// Posts
neonLine([[0, 0, -CH/2 - 0.2], [0, 2.4, -CH/2 - 0.2]], netColor, 0.025);
neonLine([[0, 0, CH/2 + 0.2], [0, 2.4, CH/2 + 0.2]], netColor, 0.025);
// Top cable
neonLine([[0, 2.4, -CH/2 - 0.2], [0, 2.4, CH/2 + 0.2]], netColor, 0.02);
// Net wires (sparse, elegant)
for (let y = 0.8; y < 2.3; y += 0.7) {
  neonLine([[0, y, -CH/2], [0, y, CH/2]], netColor, 0.008);
}
for (let z = -CH/2 + 1.6; z < CH/2; z += 1.6) {
  neonLine([[0, 0.5, z], [0, 2.3, z]], netColor, 0.008);
}

// ─── Point lights for ground reflections ───
const blueLight1 = new THREE.PointLight(0x3B82F6, 0.4, 12, 2);
blueLight1.position.set(-CW/4, 0.5, 0);
scene.add(blueLight1);
const redLight1 = new THREE.PointLight(0xEF4444, 0.4, 12, 2);
redLight1.position.set(CW/4, 0.5, 0);
scene.add(redLight1);

// ─── Player spheres ───
const orbs = [];
const orbConfigs = [
  { x: -5.5, z: -1.2, color: 0x3B82F6, team: 1 },
  { x: -3.5, z: 1.8, color: 0x3B82F6, team: 1 },
  { x: 5.5, z: 1.2, color: 0xEF4444, team: 2 },
  { x: 3.5, z: -1.8, color: 0xEF4444, team: 2 },
];

for (const cfg of orbConfigs) {
  const geo = new THREE.SphereGeometry(0.42, 32, 32);
  const mat = new THREE.MeshStandardMaterial({
    color: cfg.color, emissive: cfg.color, emissiveIntensity: 0.5,
    roughness: 0.15, metalness: 0.6
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(cfg.x, 0.45, cfg.z);
  scene.add(mesh);

  // Soft glow halo
  const haloGeo = new THREE.SphereGeometry(0.65, 16, 16);
  const haloMat = new THREE.MeshBasicMaterial({ color: cfg.color, transparent: true, opacity: 0.08 });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  mesh.add(halo);

  // Light
  const light = new THREE.PointLight(cfg.color, 0.6, 5, 2);
  light.position.y = 0.2;
  mesh.add(light);

  orbs.push({ mesh, mat, haloMat, light, baseX: cfg.x, baseZ: cfg.z, team: cfg.team, phase: Math.random() * Math.PI * 2 });
}

// ─── State ───
let scores = [0, 0];
let celebTeam = 0, celebTimer = 0;
let time = 0;

// ─── Animate ───
function animate() {
  requestAnimationFrame(animate);
  time += 0.006;

  // Smooth 360 orbit
  const dist = 20;
  camera.position.x = Math.sin(time * 0.25) * dist;
  camera.position.z = Math.cos(time * 0.25) * dist;
  camera.position.y = 8.5 + Math.sin(time * 0.1) * 1;
  camera.lookAt(0, 0.8, 0);

  // Orb movement
  for (const o of orbs) {
    o.mesh.position.x = o.baseX + Math.sin(time * 1.5 + o.phase) * 0.6;
    o.mesh.position.z = o.baseZ + Math.cos(time * 1.1 + o.phase) * 0.5;
    o.mesh.position.y = 0.45 + Math.sin(time * 2 + o.phase) * 0.08;

    if (celebTimer > 0 && celebTeam === o.team) {
      // Vibrate & glow
      o.mesh.position.x += (Math.random() - 0.5) * 0.12;
      o.mesh.position.z += (Math.random() - 0.5) * 0.12;
      o.mesh.position.y += Math.abs(Math.sin(time * 25)) * 0.25;
      o.mat.emissiveIntensity = 1.2;
      o.haloMat.opacity = 0.2;
      o.light.intensity = 1.5;
    } else {
      o.mat.emissiveIntensity = 0.5;
      o.haloMat.opacity = 0.08;
      o.light.intensity = 0.6;
    }
  }

  // Celebration: boost side light
  if (celebTimer > 0) {
    celebTimer -= 0.016;
    const pulse = celebTimer > 0 ? 0.3 + Math.sin(time * 18) * 0.15 : 0;
    if (celebTeam === 1) { blueLight1.intensity = 0.8 + pulse; redLight1.intensity = 0.15; }
    else { redLight1.intensity = 0.8 + pulse; blueLight1.intensity = 0.15; }
  } else {
    blueLight1.intensity = 0.4;
    redLight1.intensity = 0.4;
  }

  composer.render();
}
animate();

// ─── Score ───
const pointOverlay = document.getElementById('pointOverlay');
const pointText = document.getElementById('pointText');
const flashOverlay = document.getElementById('flashOverlay');

window.score = function(team) {
  scores[team - 1]++;
  document.getElementById('s' + team).textContent = scores[team - 1];

  // Score number pop
  const el = document.getElementById('s' + team);
  el.style.transform = 'scale(1.3)';
  setTimeout(() => el.style.transform = 'scale(1)', 200);

  // Celebration in 3D
  celebTeam = team;
  celebTimer = 1.5;

  // "PONTO!" overlay
  const color = team === 1 ? '#3B82F6' : '#EF4444';
  pointText.style.color = color;
  pointText.textContent = 'PONTO!';
  pointOverlay.classList.add('show');
  setTimeout(() => pointOverlay.classList.remove('show'), 1000);

  // Full-screen color flash
  flashOverlay.style.background = `radial-gradient(ellipse at center, ${color}33 0%, transparent 70%)`;
  flashOverlay.classList.add('show');
  setTimeout(() => flashOverlay.classList.remove('show'), 400);
};

// Resize
window.addEventListener('resize', () => {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});
</script>
</body>
</html>
