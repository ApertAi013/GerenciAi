<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Arena</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
  #wrap { width: 100vw; height: 100vh; position: relative; }
  canvas { display: block; width: 100%; height: 100%; }

  .score-bar {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 16px;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
    padding: 10px 28px; border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.08); z-index: 10;
  }
  .sb-team { font-size: 0.85rem; font-weight: 600; }
  .sb-team.blue { color: #60A5FA; }
  .sb-team.red { color: #F87171; }
  .sb-score { font-size: 2rem; font-weight: 900; color: #fff; min-width: 36px; text-align: center; transition: transform 0.2s; }
  .sb-vs { font-size: 0.7rem; color: #475569; font-weight: 500; }
  .sb-btn { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; font-size: 1rem; font-weight: 700; color: #fff; transition: transform 0.15s; }
  .sb-btn:hover { transform: scale(1.2); }
  .sb-btn.blue { background: #3B82F6; }
  .sb-btn.red { background: #EF4444; }
  .sb-size { font-size: 0.65rem; color: #475569; position: absolute; top: -18px; left: 50%; transform: translateX(-50%); white-space: nowrap; }

  .point-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 20; opacity: 0;
  }
  .point-overlay.show { opacity: 1; }
  .point-text {
    font-size: 6rem; font-weight: 900; text-transform: uppercase;
    letter-spacing: 8px; text-shadow: 0 0 40px currentColor, 0 0 80px currentColor, 0 0 120px currentColor;
    animation: pointPop 0.8s ease-out;
  }
  @keyframes pointPop {
    0% { transform: scale(0.3); opacity: 0; }
    30% { transform: scale(1.15); opacity: 1; }
    60% { transform: scale(0.95); }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div id="wrap">
  <canvas id="arena"></canvas>
  <div class="score-bar">
    <span class="sb-size" id="sizeLabel"></span>
    <span class="sb-team blue">Time A</span>
    <button class="sb-btn blue" onclick="score(1)">+</button>
    <span class="sb-score" id="s1">0</span>
    <span class="sb-vs">VS</span>
    <span class="sb-score" id="s2">0</span>
    <button class="sb-btn red" onclick="score(2)">+</button>
    <span class="sb-team red">Time B</span>
  </div>
  <div class="point-overlay" id="pointOverlay">
    <div class="point-text" id="pointText">PONTO!</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ─── Config from URL params ───
const params = new URLSearchParams(location.search);
const teamSize = Math.max(1, Math.min(6, parseInt(params.get('team_size') || '2')));
const team1Name = params.get('team1') || 'Time A';
const team2Name = params.get('team2') || 'Time B';
document.querySelector('.sb-team.blue').textContent = team1Name;
document.querySelector('.sb-team.red').textContent = team2Name;
document.getElementById('sizeLabel').textContent = teamSize + 'x' + teamSize;

const wrap = document.getElementById('wrap');
const canvas = document.getElementById('arena');
let W = wrap.clientWidth, H = wrap.clientHeight;

// ─── Scene ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010108);

const camera = new THREE.PerspectiveCamera(35, W / H, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

// ─── Bloom ───
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(W, H), 1.1, 0.5, 0.18);
composer.addPass(bloomPass);

// ─── Lighting ───
scene.add(new THREE.AmbientLight(0x060612, 0.4));

// ─── Ground ───
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 40),
  new THREE.MeshStandardMaterial({ color: 0x080810, roughness: 0.85, metalness: 0.05 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
scene.add(ground);

// ─── Court flash plane (covers entire court, used for score celebration) ───
const flashMat = new THREE.MeshBasicMaterial({ color: 0x3B82F6, transparent: true, opacity: 0, side: THREE.DoubleSide });
const flashPlane = new THREE.Mesh(new THREE.PlaneGeometry(18, 10), flashMat);
flashPlane.rotation.x = -Math.PI / 2;
flashPlane.position.y = 0.03;
scene.add(flashPlane);

const CW = 16, CH = 8, Y = 0.04;

// ─── Neon line (TubeGeometry + bloom) ───
const allLineObjects = []; // {tube, glow, outer, originalColor}

function neonLine(pointsArr, color, thickness = 0.03) {
  const pts = pointsArr.map(p => new THREE.Vector3(...p));
  const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0);
  const segs = Math.max(8, pts.length * 12);

  const tubeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const tube = new THREE.Mesh(new THREE.TubeGeometry(curve, segs, thickness, 8, false), tubeMat);
  scene.add(tube);

  const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.55 });
  const glow = new THREE.Mesh(new THREE.TubeGeometry(curve, segs, thickness * 3, 8, false), glowMat);
  scene.add(glow);

  const outerMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.12 });
  const outer = new THREE.Mesh(new THREE.TubeGeometry(curve, Math.max(4, pts.length * 6), thickness * 7, 6, false), outerMat);
  scene.add(outer);

  const obj = { tube, glow, outer, tubeMat, glowMat, outerMat, originalColor: new THREE.Color(color) };
  allLineObjects.push(obj);
  return obj;
}

// ─── Court lines ───
// Blue side
neonLine([[-CW/2, Y, -CH/2], [-CW/2, Y, CH/2]], 0x3B82F6);
neonLine([[-CW/2, Y, -CH/2], [0, Y, -CH/2]], 0x3B82F6);
neonLine([[-CW/2, Y, CH/2], [0, Y, CH/2]], 0x3B82F6);

// Red side
neonLine([[CW/2, Y, -CH/2], [CW/2, Y, CH/2]], 0xEF4444);
neonLine([[0, Y, -CH/2], [CW/2, Y, -CH/2]], 0xEF4444);
neonLine([[0, Y, CH/2], [CW/2, Y, CH/2]], 0xEF4444);

// ─── Net ───
const NC = 0xbb66ff;
neonLine([[0, 0, -CH/2 - 0.2], [0, 2.4, -CH/2 - 0.2]], NC, 0.025);
neonLine([[0, 0, CH/2 + 0.2], [0, 2.4, CH/2 + 0.2]], NC, 0.025);
neonLine([[0, 2.4, -CH/2 - 0.2], [0, 2.4, CH/2 + 0.2]], NC, 0.02);
for (let y = 0.8; y < 2.3; y += 0.7) neonLine([[0, y, -CH/2], [0, y, CH/2]], NC, 0.008);
for (let z = -CH/2 + 1.6; z < CH/2; z += 1.6) neonLine([[0, 0.5, z], [0, 2.3, z]], NC, 0.008);

// Ground reflections
const blueLight = new THREE.PointLight(0x3B82F6, 0.4, 12, 2);
blueLight.position.set(-CW/4, 0.5, 0); scene.add(blueLight);
const redLight = new THREE.PointLight(0xEF4444, 0.4, 12, 2);
redLight.position.set(CW/4, 0.5, 0); scene.add(redLight);

// ─── Player spheres (dynamic count based on teamSize) ───
const orbs = [];

function generatePositions(side, count) {
  // Distribute players naturally on their half
  const positions = [];
  const xRange = side === 'blue' ? [-CW/2 + 1.5, -1] : [1, CW/2 - 1.5];
  const zRange = [-CH/2 + 1, CH/2 - 1];

  if (count === 1) {
    positions.push({ x: (xRange[0] + xRange[1]) / 2, z: 0 });
  } else if (count === 2) {
    positions.push({ x: xRange[0] + (xRange[1]-xRange[0]) * 0.3, z: -CH/4 });
    positions.push({ x: xRange[0] + (xRange[1]-xRange[0]) * 0.7, z: CH/4 });
  } else if (count === 3) {
    positions.push({ x: xRange[0] + (xRange[1]-xRange[0]) * 0.2, z: 0 });
    positions.push({ x: xRange[0] + (xRange[1]-xRange[0]) * 0.7, z: -CH/3 });
    positions.push({ x: xRange[0] + (xRange[1]-xRange[0]) * 0.7, z: CH/3 });
  } else {
    for (let i = 0; i < count; i++) {
      const row = Math.floor(i / 2);
      const col = i % 2;
      const rows = Math.ceil(count / 2);
      positions.push({
        x: xRange[0] + (xRange[1]-xRange[0]) * (0.25 + row * 0.5 / Math.max(1, rows-1)),
        z: zRange[0] + (zRange[1]-zRange[0]) * (col === 0 ? 0.3 : 0.7)
      });
    }
  }
  return positions;
}

function createOrbs() {
  const bluePos = generatePositions('blue', teamSize);
  const redPos = generatePositions('red', teamSize);

  [...bluePos, ...redPos].forEach((pos, i) => {
    const isBlue = i < teamSize;
    const color = isBlue ? 0x3B82F6 : 0xEF4444;

    const geo = new THREE.SphereGeometry(0.42, 32, 32);
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 0.5,
      roughness: 0.15, metalness: 0.6
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(pos.x, 0.45, pos.z);
    scene.add(mesh);

    const haloMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.08 });
    mesh.add(new THREE.Mesh(new THREE.SphereGeometry(0.65, 16, 16), haloMat));

    const light = new THREE.PointLight(color, 0.5, 5, 2);
    light.position.y = 0.2;
    mesh.add(light);

    orbs.push({ mesh, mat, haloMat, light, baseX: pos.x, baseZ: pos.z, team: isBlue ? 1 : 2, phase: Math.random() * Math.PI * 2 });
  });
}
createOrbs();

// ─── State ───
let scores = [0, 0];
let celebTeam = 0, celebTimer = 0;
let time = 0;
let flashTimer = 0, flashTeamColor = new THREE.Color(0x3B82F6);

// ─── Animate ───
function animate() {
  requestAnimationFrame(animate);
  time += 0.006;

  // Smooth 360 orbit
  const dist = 19;
  camera.position.x = Math.sin(time * 0.25) * dist;
  camera.position.z = Math.cos(time * 0.25) * dist;
  camera.position.y = 8 + Math.sin(time * 0.1) * 1;
  camera.lookAt(0, 0.8, 0);

  // Orb movement
  for (const o of orbs) {
    o.mesh.position.x = o.baseX + Math.sin(time * 1.5 + o.phase) * 0.5;
    o.mesh.position.z = o.baseZ + Math.cos(time * 1.1 + o.phase) * 0.4;
    o.mesh.position.y = 0.45 + Math.sin(time * 2 + o.phase) * 0.06;

    if (celebTimer > 0 && celebTeam === o.team) {
      o.mesh.position.x += (Math.random() - 0.5) * 0.1;
      o.mesh.position.z += (Math.random() - 0.5) * 0.1;
      o.mesh.position.y += Math.abs(Math.sin(time * 25)) * 0.2;
      o.mat.emissiveIntensity = 1.2;
      o.haloMat.opacity = 0.18;
      o.light.intensity = 1.3;
    } else {
      o.mat.emissiveIntensity = 0.5;
      o.haloMat.opacity = 0.08;
      o.light.intensity = 0.5;
    }
  }

  // Court flash — ALL lines change to scoring team color
  if (flashTimer > 0) {
    flashTimer -= 0.025;
    const intensity = Math.max(0, flashTimer);
    flashMat.opacity = intensity * 0.2;
    flashMat.color = flashTeamColor;

    // Tint all court lines to the scoring color
    for (const l of allLineObjects) {
      const t = intensity;
      l.glowMat.color.copy(l.originalColor).lerp(flashTeamColor, t * 0.8);
      l.outerMat.color.copy(l.originalColor).lerp(flashTeamColor, t * 0.6);
    }

    // Boost bloom briefly
    bloomPass.strength = 1.1 + intensity * 0.8;

    // Boost lights
    blueLight.intensity = 0.3 + intensity * 0.8;
    redLight.intensity = 0.3 + intensity * 0.8;
    blueLight.color.copy(new THREE.Color(0x3B82F6)).lerp(flashTeamColor, intensity * 0.7);
    redLight.color.copy(new THREE.Color(0xEF4444)).lerp(flashTeamColor, intensity * 0.7);
  } else {
    // Restore defaults
    flashMat.opacity = 0;
    bloomPass.strength = 1.1;
    for (const l of allLineObjects) {
      l.glowMat.color.lerp(l.originalColor, 0.1);
      l.outerMat.color.lerp(l.originalColor, 0.1);
    }
    blueLight.color.lerp(new THREE.Color(0x3B82F6), 0.05);
    redLight.color.lerp(new THREE.Color(0xEF4444), 0.05);
    blueLight.intensity += (0.4 - blueLight.intensity) * 0.05;
    redLight.intensity += (0.4 - redLight.intensity) * 0.05;
  }

  if (celebTimer > 0) celebTimer -= 0.016;

  composer.render();
}
animate();

// ─── Score ───
const pointOverlay = document.getElementById('pointOverlay');
const pointText = document.getElementById('pointText');

window.score = function(team) {
  scores[team - 1]++;
  const el = document.getElementById('s' + team);
  el.textContent = scores[team - 1];
  el.style.transform = 'scale(1.3)';
  setTimeout(() => el.style.transform = 'scale(1)', 200);

  celebTeam = team;
  celebTimer = 1.8;

  // Flash entire court in team color
  flashTeamColor = team === 1 ? new THREE.Color(0x3B82F6) : new THREE.Color(0xEF4444);
  flashTimer = 1;

  // "PONTO!" overlay
  const color = team === 1 ? '#3B82F6' : '#EF4444';
  pointText.style.color = color;
  pointText.textContent = 'PONTO!';
  pointOverlay.classList.add('show');
  setTimeout(() => pointOverlay.classList.remove('show'), 1200);
};

// ─── Resize ───
window.addEventListener('resize', () => {
  W = wrap.clientWidth; H = wrap.clientHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
  composer.setSize(W, H);
});

// ─── PostMessage API (for iframe integration) ───
window.addEventListener('message', (e) => {
  try {
    const data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    if (data.team === 'a' || data.team === 1) score(1);
    else if (data.team === 'b' || data.team === 2) score(2);
  } catch {}
});

// ─── Embed mode: hide score bar if embedded ───
if (params.get('embed') === 'true') {
  document.querySelector('.score-bar').style.display = 'none';
  // Apply initial scores from URL
  const s1 = parseInt(params.get('score1') || '0');
  const s2 = parseInt(params.get('score2') || '0');
  scores = [s1, s2];
}
</script>
</body>
</html>
